<div class="speaker-card">

  <!-- Background Glow -->
  <div class="ambient-glow"></div>

  <!-- Floating Particles -->
  <div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- LEFT SPEAKER -->
  <div class="speaker large">

    <!-- Bass Rings -->
    <div class="bass-ring ring1"></div>
    <div class="bass-ring ring2"></div>
    <div class="bass-ring ring3"></div>

    <!-- Paint Splashes -->
    <div class="paint p1"></div>
    <div class="paint p2"></div>
    <div class="paint p3"></div>
    <div class="paint p4"></div>
    <div class="paint p5"></div>
    <div class="paint p6"></div>

    <!-- Outer Speaker -->
    <div class="speaker-shell">

      <div class="speaker-ring ring-a"></div>
      <div class="speaker-ring ring-b"></div>
      <div class="speaker-ring ring-c"></div>

      <div class="woofer">

        <div class="cone">

          <div class="cone-shadow"></div>

          <div class="dust-cap">

            <div class="center-light"></div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- RIGHT SPEAKER -->

  <div class="speaker small">

    <div class="bass-ring ring1"></div>
    <div class="bass-ring ring2"></div>

    <div class="speaker-shell">

      <div class="speaker-ring ring-a"></div>

      <div class="woofer">

        <div class="cone">

          <div class="dust-cap">

            <div class="center-light small-light"></div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Floating Music Notes -->

  <div class="music-icons">

    <span>♪</span>
    <span>♫</span>
    <span>♬</span>

  </div>

  <!-- Label -->

  <div class="speaker-label">

    <h3>Beat Sterios</h3>


  </div>

</div>
