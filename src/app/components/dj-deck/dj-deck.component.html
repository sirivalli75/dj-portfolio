<div class="dj-console">

  <!-- LEFT DECK -->
  <div class="deck left-deck">
    <div class="vinyl">
      <div class="vinyl-center"></div>
      <div class="deck-led blue"></div>
    </div>
  </div>

  <!-- MIXER -->
  <div class="mixer">

    <div class="top-indicators">
      <span></span>
      <span></span>
      <span class="active"></span>
      <span></span>
      <span></span>
    </div>

    <div class="nav-grid">

      <button class="nav-btn purple big">H</button>

      <button class="nav-btn pink">A</button>
      <button class="nav-btn pink">T</button>
      <button class="nav-btn green">O</button>

      <button class="nav-btn green">S</button>
      <button class="nav-btn yellow">M</button>
      <button class="nav-btn yellow">I</button>

      <button class="nav-btn blue">C</button>
      <button class="nav-btn purple">T</button>

    </div>

    <div class="slider-section">

      <div class="slider">
        <div class="slider-knob left"></div>
      </div>

      <div class="center-lights">
        <span></span>
        <span></span>
        <span></span>

        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="slider">
        <div class="slider-knob right"></div>
      </div>

    </div>

    <div class="crossfader">
      <div class="crossfader-knob"></div>
    </div>

  </div>

  <!-- RIGHT DECK -->
  <div class="deck right-deck">
    <div class="vinyl">
      <div class="vinyl-center"></div>
      <div class="deck-led purple"></div>
    </div>
  </div>

</div>
